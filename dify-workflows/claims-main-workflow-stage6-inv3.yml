    - data:
        code: "import json\nimport re\n\ndef parse_copy(text):\n    raw = (text or \"\").strip()\n    raw = re.sub(r\"^```(?:json)?\\s*\", \"\", raw)\n    raw = re.sub(r\"\\s*```$\", \"\", raw)\n    try:\n        obj = json.loads(raw)\n    except Exception:\n        obj = {\"user_message\": raw}\n    return obj if isinstance(obj, dict) else {\"user_message\": raw}\n\ndef main(copy_text: str, decision: str, payout_amount: float,\n         manual_review_required: bool, decision_reason: str,\n         decision_log_json: str, order_id: str, user_id: str, claim_id: str):\n    copy_obj = parse_copy(copy_text)\n    msg = str(copy_obj.get(\"user_message\") or \"\").strip()\n    invalid_terms = [\"保证\", \"绝对\", \"无条件\", \"一定通过\"]\n    copy_valid = bool(msg) and not any(term in msg for term in invalid_terms)\n    final_decision = decision\n    if not copy_valid:\n        final_decision = \"manual_review\"\n        manual_review_required = True\n        msg = \"您的理赔申请已进入人工复核，我们会结合订单、物流和材料信息进一步确认处理结果。\"\n    try:\n        log = json.loads(decision_log_json) if decision_log_json else {}\n    except Exception:\n        log = {}\n    log.update({\"copy_valid\": copy_valid, \"final_decision\": final_decision, \"user_message\": msg})\n    return {\n        \"stage4_status\": \"copy_checked\",\n        \"decision\": final_decision,\n        \"payout_amount\": float(payout_amount or 0),\n        \"manual_review_required\": bool(manual_review_required),\n        \"decision_reason\": decision_reason,\n        \"user_message\": msg,\n        \"copy_valid\": copy_valid,\n        \"decision_log_json\": json.dumps(log, ensure_ascii=False),\n        \"order_id\": order_id,\n        \"user_id\": user_id,\n        \"claim_id\": claim_id\n    }\n"
