    - data:
        code: "import json\n\ndef _f(v, d=0.0):\n    try:\n        return float(v)\n    except Exception:\n        return d\n\ndef main(payment_body, decision, payment_amount, fast_lane_executed, payout_amount,\n         decision_reason, user_message, fast_lane_json, claim_id, order_id, user_id, material_source):\n    try:\n        pb = json.loads(payment_body) if isinstance(payment_body, str) else (payment_body or {})\n    except Exception:\n        pb = {}\n    pay_result = pb.get(\"result\")\n    expected_pay = _f(payment_amount) > 0\n    payment_ok = pay_result in (\"success\", \"skipped\", \"already_paid\")\n    inconsistent = expected_pay and not payment_ok\n    if inconsistent:\n        final_state = \"failed\"\n        final_decision = \"manual_review\"\n        compensate = str(fast_lane_executed).strip().lower() in (\"true\", \"1\") or str(fast_lane_json) == \"true\"\n        final_amount = 0.0\n        reason = ((decision_reason or \"\") + \"; payment_failed->compensate+manual_review\").strip(\"; \")\n        msg = \"您的理赔在支付环节遇到问题，已转入人工复核处理，无需重复提交。\"\n        fl_json = \"false\"\n    else:\n        final_state = \"completed\"\n        final_decision = decision or \"manual_review\"\n        compensate = False\n        final_amount = _f(payout_amount)\n        reason = decision_reason or \"\"\n        msg = user_message or \"该理赔已进入处理流程，请等待后续通知。\"\n        fl_json = fast_lane_json or \"false\"\n    return {\n        \"final_state\": final_state,\n        \"final_decision\": final_decision,\n        \"compensate\": compensate,\n        \"release_json\": \"true\" if compensate else \"false\",\n        \"final_amount\": final_amount,\n        \"safe_decision_reason\": reason[:800],\n        \"safe_user_message\": msg[:800],\n        \"fast_lane_json\": fl_json,\n        \"claim_id\": claim_id,\n        \"order_id\": order_id,\n        \"user_id\": user_id,\n        \"material_source\": material_source or \"\",\n        \"payment_result\": pay_result or \"unknown\",\n    }\n"
        code_language: python3
        desc: INV-3：支付失败则状态置 failed、降级人工、释放快速通道名额。
