    - data:
        code: "import json\n\ndef as_bool(value):\n    if isinstance(value, bool):\n        return value\n    return str(value).strip().lower() in (\"true\", \"1\", \"yes\")\n\ndef to_float(value, default=0.0):\n    try:\n        return float(value)\n    except Exception:\n        return default\n\ndef to_int(value, default=0):\n    try:\n        return int(float(value))\n    except Exception:\n        return default\n\ndef safe_text(value, limit=800):\n    text = str(value or \"\").replace(\"\\\\\", \"/\").replace('\"', \"'\")\n    text = \" \".join(text.split())\n    return text[:limit]\n\ndef main(stage4_status: str, decision: str, payout_amount: float,\n         manual_review_required: bool, decision_reason: str,\n         user_message: str, copy_valid: bool, decision_log_json: str,\n         order_id: str, user_id: str, claim_id: str, order_amount: float,\n         material_source: str, missing_fields_json: str, claim_result: str,\n         risk_result: str, max_daily_fast_lane: float):\n    branch = \"fast_lane\"\n    final_decision = (decision or \"manual_review\").strip()\n    payout = max(0.0, to_float(payout_amount))\n    manual = as_bool(manual_review_required) or final_decision == \"manual_review\"\n    reason = safe_text(decision_reason, 1200)\n    copy_ok = as_bool(copy_valid)\n    msg = safe_text(user_message)\n\n    if final_decision not in (\"approve\", \"reject\", \"manual_review\"):\n        final_decision = \"manual_review\"\n        payout = 0.0\n        manual = True\n        reason = (reason + \"; invalid decision\").strip(\"; \")\n    if not copy_ok:\n        final_decision = \"manual_review\"\n        payout = 0.0\n        manual = True\n        reason = (reason + \"; copy validation failed\").strip(\"; \")\n    if final_decision != \"approve\":\n        payout = 0.0\n    if not msg:\n        msg = \"该理赔已进入处理流程，请等待后续通知。\"\n\n    payment_amount = payout if final_decision == \"approve\" else 0.0\n    fast_lane_max_daily = to_int(max_daily_fast_lane, 1) if final_decision == \"approve\" else 0\n\n    return {\n        \"stage5_status\": \"safety_guard_ready\",\n        \"branch\": branch,\n        \"decision\": final_decision,\n        \"payout_amount\": payout,\n        \"payment_amount\": payment_amount,\n        \"manual_review_required\": manual,\n        \"decision_reason\": reason,\n        \"safe_decision_reason\": safe_text(reason),\n        \"user_message\": msg,\n        \"safe_user_message\": msg,\n        \"copy_valid\": copy_ok,\n        \"fast_lane_branch\": True,\n        \"fast_lane_max_daily\": fast_lane_max_daily,\n        \"fast_lane_json\": \"false\",\n        \"fast_lane_executed\": False,\n        \"claim_id\": claim_id,\n        \"order_id\": order_id,\n        \"user_id\": user_id,\n        \"order_amount\": to_float(order_amount),\n        \"material_source\": material_source or \"\",\n        \"missing_fields_json\": missing_fields_json or \"[]\",\n        \"claim_result\": claim_result or \"{}\",\n        \"risk_result\": risk_result or \"{}\",\n        \"decision_log_json\": decision_log_json or \"{}\"\n    }"
        code_language: python3
        desc: 统一执行金额、文案、决策类型与快速通道计数前置校验。
        outputs:
          stage5_status:
            children: {}
            type: string
          branch:
            children: {}
            type: string
          decision:
            children: {}
            type: string
          payout_amount:
            children: {}
            type: number
          payment_amount:
