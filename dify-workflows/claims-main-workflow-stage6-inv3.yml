    - data:
        code: "import json\n\ndef load(value, default):\n    if isinstance(value, (dict, list)):\n        return value\n    try:\n        return json.loads(value) if value else default\n    except Exception:\n        return default\n\ndef main(claim_result: str, risk_result: str, retrieval_branch: str,\n         retrieval_degradation_band: str, retrieved_context: str,\n         claim_materials: str, risk_materials: str, biz_context: str,\n         biz_stats_json: str, order_id: str, user_id: str, claim_id: str,\n         order_amount: float, degradation_index: float, material_source: str,\n         missing_fields_json: str):\n    claim = load(claim_result, {})\n    risk = load(risk_result, {})\n    claim_hint = str(claim.get(\"decision_hint\", \"manual_review\"))\n    risk_hint = str(risk.get(\"decision_hint\", \"manual_review\"))\n    risk_score = float(risk.get(\"abuse_risk_score\") or 0)\n    if claim_hint == \"reject\" or risk_hint == \"reject\":\n        decision = \"reject\"\n    elif claim.get(\"manual_review_required\") or risk.get(\"manual_review_required\") or risk_score >= 0.65:\n        decision = \"manual_review\"\n    else:\n        decision = \"approve\"\n    if decision == \"approve\" and float(degradation_index or 0) > 0.35:\n        decision = \"manual_review\"\n    payout = max(0, min(float(order_amount or 0), float(claim.get(\"loss_amount\") or 0)))\n    manual = decision == \"manual_review\"\n    reason = \"claim=%s;risk=%s;branch=degraded;risk_score=%.2f\" % (claim_hint, risk_hint, risk_score)\n    copy_context = {\n        \"branch\": \"degraded\",\n        \"decision\": decision,\n        \"payout_amount\": payout,\n        \"manual_review_required\": manual,\n        \"decision_reason\": reason,\n        \"claim\": claim,\n        \"risk\": risk,\n        \"retrieved_context\": load(retrieved_context, {})\n    }\n    return {\n        \"stage4_status\": \"consensus_ready\",\n        \"decision\": decision,\n        \"payout_amount\": payout,\n        \"manual_review_required\": manual,\n        \"decision_reason\": reason,\n        \"claim_result\": json.dumps(claim, ensure_ascii=False),\n        \"risk_result\": json.dumps(risk, ensure_ascii=False),\n        \"copy_context\": json.dumps(copy_context, ensure_ascii=False),\n        \"decision_log_json\": json.dumps(copy_context, ensure_ascii=False),\n        \"order_id\": order_id,\n        \"user_id\": user_id,\n        \"claim_id\": claim_id,\n        \"order_amount\": float(order_amount or 0),\n        \"material_source\": material_source,\n        \"missing_fields_json\": missing_fields_json\n    }\n"
