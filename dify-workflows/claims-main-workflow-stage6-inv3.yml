    - data:
        code: "import json\nimport re\n\ndef parse_json(text, fallback):\n    if isinstance(text, dict):\n        return text\n    if not text:\n        return fallback\n    raw = str(text).strip()\n    raw = re.sub(r\"^```(?:json)?\\s*\", \"\", raw)\n    raw = re.sub(r\"\\s*```$\", \"\", raw)\n    try:\n        return json.loads(raw)\n    except Exception:\n        m = re.search(r\"\\{.*\\}\", raw, re.S)\n        if m:\n            try:\n                return json.loads(m.group(0))\n            except Exception:\n                pass\n    fallback[\"parse_error\"] = True\n    fallback[\"raw_text\"] = raw[:2000]\n    return fallback\n\ndef main(claim_text: str, risk_text: str, stage2_status: str, retrieval_branch: str,\n         retrieval_query: str, retrieval_degradation_band: str, retrieved_context: str,\n         claim_materials: str, risk_materials: str, biz_context: str, biz_stats_json: str,\n         order_id: str, user_id: str, claim_id: str, order_amount: float,\n         degradation_index: float, material_source: str, missing_fields_json: str):\n    claim = parse_json(claim_text, {\n        \"liability\": \"unknown\",\n        \"decision_hint\": \"manual_review\",\n        \"loss_amount\": 0,\n        \"confidence\": 0,\n        \"reason_codes\": [\"claim_assistant_parse_failed\"],\n        \"evidence_summary\": \"\",\n        \"risk_flags\": [],\n        \"manual_review_required\": True\n    })\n    risk = parse_json(risk_text, {\n        \"credit_level\": \"medium\",\n        \"abuse_risk_score\": 0.5,\n        \"decision_hint\": \"manual_review\",\n        \"risk_reasons\": [\"risk_assistant_parse_failed\"],\n        \"user_profile_summary\": \"\",\n        \"manual_review_required\": True\n    })\n    manual_review_required = bool(\n        claim.get(\"manual_review_required\") or\n        risk.get(\"manual_review_required\") or\n        claim.get(\"parse_error\") or\n        risk.get(\"parse_error\")\n    )\n    return {\n        \"stage3_status\": \"assistants_ready\",\n        \"retrieval_branch\": retrieval_branch,\n        \"retrieval_query\": retrieval_query,\n        \"retrieval_degradation_band\": retrieval_degradation_band,\n        \"claim_result\": json.dumps(claim, ensure_ascii=False),\n        \"risk_result\": json.dumps(risk, ensure_ascii=False),\n        \"claim_decision_hint\": str(claim.get(\"decision_hint\", \"manual_review\")),\n        \"risk_decision_hint\": str(risk.get(\"decision_hint\", \"manual_review\")),\n        \"liability\": str(claim.get(\"liability\", \"unknown\")),\n        \"loss_amount\": float(claim.get(\"loss_amount\") or 0),\n        \"claim_confidence\": float(claim.get(\"confidence\") or 0),\n        \"credit_level\": str(risk.get(\"credit_level\", \"medium\")),\n        \"abuse_risk_score\": float(risk.get(\"abuse_risk_score\") or 0.5),\n        \"manual_review_required\": manual_review_required,\n        \"retrieved_context\": retrieved_context,\n        \"claim_materials\": claim_materials,\n        \"risk_materials\": risk_materials,\n        \"biz_context\": biz_context,\n        \"biz_stats_json\": biz_stats_json,\n        \"order_id\": order_id,\n        \"user_id\": user_id,\n        \"claim_id\": claim_id,\n        \"order_amount\": order_amount,\n        \"degradation_index\": degradation_index,\n        \"material_source\": material_source,\n        \"missing_fields_json\": missing_fields_json\n    }\n"
