    - data:
        code: "import json\n\ndef as_bool(value):\n    if isinstance(value, bool):\n        return value\n    return str(value).strip().lower() in (\"true\", \"1\", \"yes\")\n\ndef to_float(value, default=0.0):\n    try:\n        return float(value)\n    except Exception:\n        return default\n\ndef safe_text(value, limit=800):\n    text = str(value or \"\").replace(\"\\\\\", \"/\").replace('\"', \"'\")\n    text = \" \".join(text.split())\n    return text[:limit]\n\ndef parse_body(value):\n    if isinstance(value, dict):\n        return value\n    try:\n        return json.loads(value or \"{}\")\n    except Exception:\n        return {}\n\ndef main(fast_lane_body: str, stage5_status: str, branch: str,\n         fast_lane_branch: bool, decision: str, payout_amount: float,\n         payment_amount: float, manual_review_required: bool,\n         decision_reason: str, user_message: str, copy_valid: bool,\n         claim_id: str, order_id: str, user_id: str, order_amount: float,\n         material_source: str, missing_fields_json: str,\n         claim_result: str, risk_result: str, decision_log_json: str):\n    body = parse_body(fast_lane_body)\n    accepted = as_bool(body.get(\"accepted\"))\n    final_decision = (decision or \"manual_review\").strip()\n    payout = max(0.0, to_float(payout_amount))\n    pay = max(0.0, to_float(payment_amount))\n    manual = as_bool(manual_review_required)\n    reason = safe_text(decision_reason, 1200)\n    msg = safe_text(user_message)\n    fast_branch = as_bool(fast_lane_branch)\n    fast_lane_executed = bool(fast_branch and final_decision == \"approve\" and accepted)\n\n    if fast_branch and final_decision == \"approve\" and not accepted:\n        final_decision = \"manual_review\"\n        payout = 0.0\n        pay = 0.0\n        manual = True\n        fast_lane_executed = False\n        reason = (reason + \"; fast lane count rejected\").strip(\"; \")\n        msg = \"当前快速理赔名额已满，已转入人工复核。\"\n\n    if final_decision != \"approve\":\n        payout = 0.0\n        pay = 0.0\n    if not msg:\n        msg = \"该理赔已进入处理流程，请等待后续通知。\"\n\n    return {\n        \"stage5_status\": \"post_guard_ready\",\n        \"branch\": branch or \"\",\n        \"decision\": final_decision,\n        \"payout_amount\": payout,\n        \"payment_amount\": pay,\n        \"manual_review_required\": manual,\n        \"decision_reason\": reason,\n        \"safe_decision_reason\": safe_text(reason),\n        \"user_message\": msg,\n        \"safe_user_message\": safe_text(msg),\n        \"copy_valid\": as_bool(copy_valid),\n        \"fast_lane_branch\": fast_branch,\n        \"fast_lane_json\": \"true\" if fast_lane_executed else \"false\",\n        \"fast_lane_executed\": fast_lane_executed,\n        \"fast_lane_result\": json.dumps(body, ensure_ascii=False),\n        \"claim_id\": claim_id,\n        \"order_id\": order_id,\n        \"user_id\": user_id,\n        \"order_amount\": to_float(order_amount),\n        \"material_source\": material_source or \"\",\n        \"missing_fields_json\": missing_fields_json or \"[]\",\n        \"claim_result\": claim_result or \"{}\",\n        \"risk_result\": risk_result or \"{}\",\n        \"decision_log_json\": decision_log_json or \"{}\"\n    }"
        code_language: python3
