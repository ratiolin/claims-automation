        code: "import json\n\ndef normalize(items):\n    rows = []\n    if not items:\n        return rows\n    for item in items[:5]:\n        if not isinstance(item, dict):\n            continue\n        metadata = item.get(\"metadata\") or {}\n        rows.append({\n            \"title\": item.get(\"title\") or item.get(\"document_name\") or metadata.get(\"title\", \"\"),\n            \"content\": item.get(\"content\") or item.get(\"text\") or \"\",\n            \"score\": item.get(\"score\") or metadata.get(\"score\"),\n            \"metadata\": metadata\n        })\n    return rows\n\ndef main(error_patterns: list, similar_cases: list, retrieval_query: str,\n         retrieval_degradation_band: str, claim_materials: str, risk_materials: str,\n         biz_context: str, biz_stats_json: str, order_id: str, user_id: str,\n         claim_id: str, order_amount: float, degradation_index: float,\n         material_source: str, missing_fields_json: str):\n    error_rows = normalize(error_patterns)\n    case_rows = normalize(similar_cases)\n    retrieved_context = {\n        \"branch\": \"healthy\",\n        \"query\": retrieval_query,\n        \"degradation_band\": retrieval_degradation_band,\n        \"error_patterns\": error_rows,\n        \"similar_cases\": case_rows\n    }\n    return {\n        \"stage2_status\": \"retrieval_ready\",\n        \"retrieval_branch\": \"healthy\",\n        \"fast_lane\": False,\n        \"retrieval_query\": retrieval_query,\n        \"retrieval_degradation_band\": retrieval_degradation_band,\n        \"error_patterns_json\": json.dumps(error_rows, ensure_ascii=False),\n        \"similar_cases_json\": json.dumps(case_rows, ensure_ascii=False),\n        \"retrieved_context\": json.dumps(retrieved_context, ensure_ascii=False),\n        \"error_pattern_count\": len(error_rows),\n        \"similar_case_count\": len(case_rows),\n        \"claim_materials\": claim_materials,\n        \"risk_materials\": risk_materials,\n        \"biz_context\": biz_context,\n        \"biz_stats_json\": biz_stats_json,\n        \"order_id\": order_id,\n        \"user_id\": user_id,\n        \"claim_id\": claim_id,\n        \"order_amount\": order_amount,\n        \"degradation_index\": degradation_index,\n        \"material_source\": material_source,\n        \"missing_fields_json\": missing_fields_json\n    }\n"
