app:
  description: Stage6：payment 后加 settle+release，关闭 INV-3 跨服务补偿缺口（支付失败→状态failed+降级+释放名额）。
  icon: 🧾
  icon_type: emoji
  icon_background: '#E8F5E9'
  mode: workflow
  name: 理赔主工作流 (stage6 INV-3)
  use_icon_as_answer_icon: false
kind: app
version: 0.6.0
