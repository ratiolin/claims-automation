    - data:
        code: "import json\n\ndef load(value, default):\n    if isinstance(value, (dict, list)):\n        return value\n    try:\n        return json.loads(value) if value else default\n    except Exception:\n        return default\n\ndef main(claim_result: str, risk_result: str, biz_stats_json: str,\n         order_id: str, user_id: str, claim_id: str, order_amount: float,\n         degradation_index: float, material_source: str, missing_fields_json: str,\n         biz_context: str):\n    claim = load(claim_result, {})\n    risk = load(risk_result, {})\n    missing = load(missing_fields_json, [])\n    amount = float(order_amount or 0)\n    payout = float(claim.get(\"suggested_amount\") or claim.get(\"loss_amount\") or 0)\n    payout = max(0, min(amount, payout))\n    reasons = [\"fast_lane_matched\"]\n    decision = \"approve\"\n    manual = False\n    if missing:\n        decision, manual = \"manual_review\", True\n        reasons.append(\"missing_fields\")\n    if float(degradation_index or 0) > 0.6:\n        decision, manual = \"manual_review\", True\n        reasons.append(\"high_degradation\")\n    copy_context = {\n        \"branch\": \"fast_lane\",\n        \"decision\": decision,\n        \"payout_amount\": payout,\n        \"manual_review_required\": manual,\n        \"decision_reason\": \"；\".join(reasons),\n        \"claim\": claim,\n        \"risk\": risk,\n        \"biz_context\": biz_context\n    }\n    return {\n        \"stage4_status\": \"consensus_ready\",\n        \"decision\": decision,\n        \"payout_amount\": payout,\n        \"manual_review_required\": manual,\n        \"decision_reason\": \"；\".join(reasons),\n        \"claim_result\": json.dumps(claim, ensure_ascii=False),\n        \"risk_result\": json.dumps(risk, ensure_ascii=False),\n        \"copy_context\": json.dumps(copy_context, ensure_ascii=False),\n        \"decision_log_json\": json.dumps(copy_context, ensure_ascii=False),\n        \"order_id\": order_id,\n        \"user_id\": user_id,\n        \"claim_id\": claim_id,\n        \"order_amount\": amount,\n        \"material_source\": material_source,\n        \"missing_fields_json\": json.dumps(missing, ensure_ascii=False)\n    }\n"
