app:
  description: "电商理赔自动处理系统主工作流 Stage 1 + 3.3 + 3.4/3.5 + 3.6：数据拉取、知识检索、双助手并行推理、合议中心与单次文案生成校验。"
  icon: "🧾"
  icon_type: emoji
  icon_background: "#E8F5E9"
  mode: workflow
  name: 理赔主工作流
  use_icon_as_answer_icon: false

