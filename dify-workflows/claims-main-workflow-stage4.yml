      - data:
          code: |
            import json

            def parse_obj(raw, default=None):
                if raw is None:
                    return default if default is not None else {}
                if isinstance(raw, str):
                    try:
                        return json.loads(raw)
                    except (json.JSONDecodeError, TypeError):
                        return default if default is not None else {}
                return raw

            def to_float(value):
                try:
                    return float(value)
                except (TypeError, ValueError):
                    return None

            def to_int(value, default=0):
                try:
                    return int(value)
                except (TypeError, ValueError):
                    return default

            def to_bool(value):
                if isinstance(value, bool):
                    return value
                if isinstance(value, str):
                    return value.strip().lower() in ["true", "1", "yes", "y"]
                return bool(value)

            def file_names_from_list(file_list):
                files = parse_obj(file_list, [])
                if not isinstance(files, list):
                    return []
                names = []
                for item in files:
                    if isinstance(item, dict):
                        names.append(item.get("name") or item.get("filename") or item.get("display_name") or "")
                    else:
                        names.append(str(item))
                return [n for n in names if n]

            def guess_materials_from_filenames(file_list):
                names = [n.lower() for n in file_names_from_list(file_list)]
                has_order = any("订单" in n or "order" in n for n in names)
                has_logistics = any("物流" in n or "logistics" in n for n in names)
                return has_order, has_logistics, "filename_guess"

            def evaluate_fast_lane(order_amount, claim_count_12m, static_risk,
                                   logistics_type, materials_ok, material_source, signal_light,
                                   degradation_index, fast_lane_count_today,
                                   max_daily_fast_lane, max_degradation_fast_lane):
                cfg = {
                    "max_order_amount": 100.0,
                    "max_claims_12m": 2,
                    "allowed_logistics": ["超时未更新", "错分"],
                    "require_signal_green": True,
                    "require_materials_complete": True,
                    "payout_cap": 30.0
                }
                if order_amount is None or order_amount > cfg["max_order_amount"]:
                    return None
                if claim_count_12m is None or claim_count_12m > cfg["max_claims_12m"]:
                    return None
                if static_risk == "high":
                    return None
                if logistics_type not in cfg["allowed_logistics"]:
                    return None
                if cfg["require_signal_green"] and signal_light != "green":
                    return None
                if cfg["require_materials_complete"] and not materials_ok:
                    return None
                if material_source != "vision_model":
                    return None
                if degradation_index > max_degradation_fast_lane:
                    return None
                if fast_lane_count_today >= max_daily_fast_lane:
                    return None

                payout = min(order_amount, cfg["payout_cap"])
                return {
                    "fast_lane": True,
                    "payout": payout,
                    "reason": "您的订单因物流异常，符合快速赔付标准。"
                }

            def main(user_text, file_list, order_id, user_id, claim_id,
                     order_amount_body, claim_count_body, static_risk_body,
                     logistics_type_body, category_body, biz_stats_body,
                     materials_validation_body, fast_lane_count_body):
                user_text = user_text or ""

                order_amount_obj = parse_obj(order_amount_body, {})
                claim_count_obj = parse_obj(claim_count_body, {})
                static_risk_obj = parse_obj(static_risk_body, {})
                logistics_obj = parse_obj(logistics_type_body, {})
                category_obj = parse_obj(category_body, {})
                biz_stats = parse_obj(biz_stats_body, {})
                materials_validation = parse_obj(materials_validation_body, {})
                fast_lane_count_obj = parse_obj(fast_lane_count_body, {})

                order_amount = to_float(order_amount_obj.get("amount"))
                claim_count_12m = to_int(claim_count_obj.get("claim_count_12m"), default=None)
                static_risk = (static_risk_obj.get("static_risk") or "").lower()
                logistics_type = logistics_obj.get("anomaly_type")
                category = category_obj.get("category")

                material_source = "none"
                has_order_screenshot = False
                has_logistics_screenshot = False
                if isinstance(materials_validation, dict) and materials_validation.get("source") == "vision_model":
                    has_order_screenshot = to_bool(materials_validation.get("has_order_screenshot", False))
                    has_logistics_screenshot = to_bool(materials_validation.get("has_logistics_screenshot", False))
                    material_source = "vision_model"
                else:
                    has_order_screenshot, has_logistics_screenshot, material_source = guess_materials_from_filenames(file_list)

                materials_ok = has_order_screenshot and has_logistics_screenshot

                signal_light = biz_stats.get("signal_light", "yellow")
                degradation_index = to_float(biz_stats.get("smoothed_degradation_index"))
                if degradation_index is None:
                    degradation_index = to_float(biz_stats.get("degradation_index"))
                degradation_index = 0.5 if degradation_index is None else max(0.0, min(degradation_index, 1.0))
                queue_pressure = to_float(biz_stats.get("queue_pressure"))
                queue_pressure = 0.5 if queue_pressure is None else max(0.0, min(queue_pressure, 1.0))
                k_factor = to_float(biz_stats.get("k_factor"))
                k_factor = 2.0 if k_factor is None else k_factor
                max_daily_fast_lane = to_int(biz_stats.get("max_daily_fast_lane"), 1)
                max_degradation_fast_lane = to_float(biz_stats.get("max_degradation_fast_lane"))
                max_degradation_fast_lane = 0.15 if max_degradation_fast_lane is None else max_degradation_fast_lane
                fast_lane_count_today = to_int(
                    fast_lane_count_obj.get("fast_lane_count_today", fast_lane_count_obj.get("count")),
                    0
                )

                fast_lane = evaluate_fast_lane(
                    order_amount, claim_count_12m, static_risk,
                    logistics_type, materials_ok, material_source, signal_light,
                    degradation_index, fast_lane_count_today,
                    max_daily_fast_lane, max_degradation_fast_lane
                )

                amount_range = "small" if order_amount and order_amount <= 50 else (
                    "medium" if order_amount and order_amount <= 200 else "large")
                retrieval_query = json.dumps({
                    "物流异常类型": logistics_type or "未知",
                    "金额区间": amount_range,
                    "商品品类": category or "未知",
                    "用户描述": user_text
                }, ensure_ascii=False)

                biz_context = json.dumps({
                    "signal_light": signal_light,
                    "material_source": material_source
                }, ensure_ascii=False)

                signal_quality_raw = {
                    "has_api_logistics": logistics_type is not None,
                    "has_api_order": order_amount is not None,
                    "has_screenshot_evidence": has_order_screenshot or has_logistics_screenshot,
                    "material_source": material_source,
                    "materials_verified_by_vision": material_source == "vision_model",
                    "data_quality": "partial" if (logistics_type is None or order_amount is None) else "full"
                }

                claim_result = ""
                risk_result = ""
                if fast_lane:
                    claim_result = json.dumps({
                        "claim_valid": True,
                        "claim_reason": fast_lane["reason"],
                        "suggested_amount": fast_lane["payout"],
                        "confidence": "high",
                        "evidence_summary": "快速通道自动判定",
                        "signal_quality": signal_quality_raw
                    }, ensure_ascii=False)
                    risk_result = json.dumps({
                        "risk_level": "low",
                        "risk_reason": "快速通道自动判定低风险",
                        "claim_frequency": 0,
                        "anomaly_signals": [],
                        "recommended_cap": -1,
                        "signal_quality": {
                            "data_completeness": "full",
                            "missing_fields": [],
                            "fast_lane": True
                        }
                    }, ensure_ascii=False)

                missing_fields = []
                if order_amount is None:
                    missing_fields.append("order_amount")
                if claim_count_12m is None:
                    missing_fields.append("claim_count_12m")
                if not logistics_type:
                    missing_fields.append("logistics_type")
                if not category:
                    missing_fields.append("category")

                return {
                    "valid": True,
                    "order_id": order_id,
                    "user_id": user_id,
                    "claim_id": claim_id,
                    "fast_lane": fast_lane is not None,
                    "claim_result": claim_result,
                    "risk_result": risk_result,
                    "retrieval_query": retrieval_query,
                    "retrieval_degradation_band": "degraded" if degradation_index > 0.3 else "healthy",
                    "biz_context": biz_context,
                    "biz_stats_json": json.dumps(biz_stats, ensure_ascii=False),
                    "claim_materials": json.dumps({
                        "order_id": order_id,
                        "order_amount": order_amount,
                        "logistics_type": logistics_type,
                        "category": category,
                        "user_description": user_text,
                        "file_types": {
                            "has_order_screenshot": has_order_screenshot,
                            "has_logistics_screenshot": has_logistics_screenshot,
                            "material_source": material_source
                        }
                    }, ensure_ascii=False),
                    "risk_materials": json.dumps({
                        "user_id": user_id,
                        "order_id": order_id,
                        "claim_count_12m": claim_count_12m,
                        "static_risk": static_risk
                    }, ensure_ascii=False),
                    "order_amount": order_amount or 0,
                    "claim_count_12m": claim_count_12m if claim_count_12m is not None else -1,
                    "static_risk": static_risk or "unknown",
                    "logistics_type": logistics_type or "",
                    "category": category or "",
                    "material_source": material_source,
