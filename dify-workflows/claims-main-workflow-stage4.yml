            def decide(claim, risk, branch, amount, degradation_index, material_source):
                claim_hint = str(claim.get("decision_hint", "manual_review"))
                risk_hint = str(risk.get("decision_hint", "manual_review"))
                manual = bool(claim.get("manual_review_required") or risk.get("manual_review_required"))
                if claim_hint == "reject" or risk_hint == "reject":
                    decision = "reject"
                elif manual or claim_hint == "manual_review" or risk_hint == "manual_review":
                    decision = "manual_review"
                else:
                    decision = "approve"
                risk_score = float(risk.get("abuse_risk_score") or 0)
                if risk_score >= 0.75 or material_source != "vision_model":
                    decision = "manual_review"
                if branch == "degraded" and float(degradation_index or 0) > 0.5 and decision == "approve":
                    decision = "manual_review"
                payout = max(0, min(float(amount or 0), float(claim.get("loss_amount") or 0)))
