      - data:
          model:
            provider: langgenius/deepseek/deepseek
            name: deepseek-v4-flash
            mode: chat
            completion_params:
              temperature: 0.3
              thinking: false
          prompt_template:
            - role: system
              text: |
                你是电商理赔客服文案助手。根据合议中心上下文生成面向用户的理赔结果文案。

                合议上下文：
                {{#consensus_healthy.copy_context#}}

                输出严格 JSON，不要包裹 markdown：
                {
                  "user_message": "...",
                  "tone": "friendly",
                  "summary": "...",
                  "next_step": "..."
                }

                约束：
                - 语气克制、礼貌、具体。
                - approve 时说明赔付金额和处理时效。
                - manual_review 时说明进入人工复核，不承诺最终结果。
                - reject 时说明核心原因和申诉入口。
                - 不得出现绝对化承诺。
              id: prompt-copy-healthy
              edition_type: basic
          context:
            enabled: true
            variable_selector:
              - consensus_healthy
              - copy_context
          vision:
            enabled: false
          type: llm
          title: 文案生成（健康）
          selected: false
          structured_output_enabled: false
          prompt_config:
            jinja2_variables: []
        height: 98
        id: copy_generator_healthy
        position:
          x: 5600
          y: 340
        positionAbsolute:
          x: 5600
          y: 340
        selected: false
        sourcePosition: right
        targetPosition: left
        type: custom
        width: 244

      - data:
          code: |
            import json
            import re

            def parse_copy(text):
                raw = (text or "").strip()
                raw = re.sub(r"^```(?:json)?\s*", "", raw)
                raw = re.sub(r"\s*```$", "", raw)
                try:
                    obj = json.loads(raw)
                except Exception:
                    obj = {"user_message": raw}
                return obj if isinstance(obj, dict) else {"user_message": raw}

            def main(copy_text: str, decision: str, payout_amount: float,
                     manual_review_required: bool, decision_reason: str,
                     decision_log_json: str, order_id: str, user_id: str, claim_id: str):
                copy_obj = parse_copy(copy_text)
                msg = str(copy_obj.get("user_message") or "").strip()
                invalid_terms = ["保证", "绝对", "无条件", "一定通过"]
                copy_valid = bool(msg) and not any(term in msg for term in invalid_terms)
                final_decision = decision
                if not copy_valid:
                    final_decision = "manual_review"
                    manual_review_required = True
                    msg = "您的理赔申请已进入人工复核，我们会结合订单、物流和材料信息进一步确认处理结果。"
                try:
                    log = json.loads(decision_log_json) if decision_log_json else {}
                except Exception:
                    log = {}
                log.update({"copy_valid": copy_valid, "final_decision": final_decision, "user_message": msg})
                return {
                    "stage4_status": "copy_checked",
                    "decision": final_decision,
                    "payout_amount": float(payout_amount or 0),
                    "manual_review_required": bool(manual_review_required),
                    "decision_reason": decision_reason,
                    "user_message": msg,
                    "copy_valid": copy_valid,
                    "decision_log_json": json.dumps(log, ensure_ascii=False),
                    "order_id": order_id,
                    "user_id": user_id,
                    "claim_id": claim_id
                }
          code_language: python3
          desc: "校验健康分支文案；失败时直接转人工兜底。"
          outputs:
            stage4_status:
              children: {}
              type: string
            decision:
              children: {}
              type: string
            payout_amount:
              children: {}
              type: number
            manual_review_required:
              children: {}
              type: boolean
            decision_reason:
              children: {}
              type: string
            user_message:
              children: {}
              type: string
            copy_valid:
              children: {}
              type: boolean
            decision_log_json:
              children: {}
              type: string
            order_id:
              children: {}
              type: string
            user_id:
              children: {}
              type: string
            claim_id:
              children: {}
              type: string
          selected: false
          title: 文案校验（健康）
          type: code
          variables:
            - value_selector:
                - copy_generator_healthy
                - text
              variable: copy_text
            - value_selector:
                - consensus_healthy
                - decision
              variable: decision
            - value_selector:
                - consensus_healthy
                - payout_amount
              variable: payout_amount
            - value_selector:
                - consensus_healthy
