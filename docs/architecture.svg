<svg viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif" role="img" aria-labelledby="t d">
  <title id="t">电商理赔主工作流架构</title>
  <desc id="d">stage6.1：幂等入口→8路并行拉数(全降级)→风险三带(快速/健康/劣化)→双助手合议→护栏/支付幂等/settle-release补偿/状态CAS/决策日志。LLM只提议，确定性代码与外部服务处置，副作用各自幂等，支付失败跨服务补偿。</desc>
  <rect x="0" y="0" width="1000" height="600" fill="#ffffff"/>

  <text x="20" y="28" font-size="18" font-weight="700" fill="#0f172a">电商理赔主工作流 · stage6.1（68 节点 / 24 HTTP / 3 风险带）</text>
  <text x="20" y="50" font-size="13" fill="#475569">LLM 只提议 · 确定性代码与外部服务处置 · 副作用各自幂等 · 支付失败跨服务补偿</text>

  <!-- 主干 backbone -->
  <g>
    <rect x="20" y="72" width="150" height="46" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="95" y="92" font-size="12.5" font-weight="600" text-anchor="middle" fill="#334155">用户申请</text>
    <text x="95" y="108" font-size="11" text-anchor="middle" fill="#64748b">user_text + 材料</text>

    <rect x="190" y="72" width="160" height="46" rx="8" fill="#d1fae5" stroke="#059669"/>
    <text x="270" y="92" font-size="12.5" font-weight="600" text-anchor="middle" fill="#065f46">幂等入口 · 重复早停</text>
    <text x="270" y="108" font-size="11" text-anchor="middle" fill="#047857">claim_id · create-if-absent</text>

    <rect x="370" y="72" width="160" height="46" rx="8" fill="#d1fae5" stroke="#059669"/>
    <text x="450" y="92" font-size="12.5" font-weight="600" text-anchor="middle" fill="#065f46">8 路并行拉数</text>
    <text x="450" y="108" font-size="11" text-anchor="middle" fill="#047857">订单/物流/用户/视觉/配置</text>

    <rect x="550" y="72" width="200" height="46" rx="8" fill="#dbeafe" stroke="#2563eb"/>
    <text x="650" y="92" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1e3a8a">assemble · 风险分带</text>
    <text x="650" y="108" font-size="11" text-anchor="middle" fill="#1d4ed8">清洗 · 快速通道评估</text>

    <line x1="170" y1="95" x2="188" y2="95" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="350" y1="95" x2="368" y2="95" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="530" y1="95" x2="548" y2="95" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  </g>
  <text x="370" y="135" font-size="10.5" fill="#94a3b8">24 个 HTTP 节点全部 error_strategy=default-value：失败→保守降级，流程不中断（INV-5）</text>

  <!-- 三带 bands -->
  <g>
    <rect x="20" y="160" width="300" height="78" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="34" y="182" font-size="12.5" font-weight="700" fill="#1e3a8a">① 快速通道 fast_lane</text>
    <text x="34" y="202" font-size="11" fill="#475569">9 条准入全满足 · 赔付封顶 30</text>
    <text x="34" y="220" font-size="11" fill="#475569">跳过检索与双助手，直接合议</text>

    <rect x="350" y="160" width="300" height="78" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="364" y="182" font-size="12.5" font-weight="700" fill="#1e3a8a">② 健康带 healthy</text>
    <text x="364" y="202" font-size="11" fill="#475569">检索(正式库+案例库) → 定责 ∥ 信用</text>
    <text x="364" y="220" font-size="11" fill="#475569">双助手 → 合议中心（阈值 0.75）</text>

    <rect x="680" y="160" width="300" height="78" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="694" y="182" font-size="12.5" font-weight="700" fill="#9a3412">③ 劣化带 degraded</text>
    <text x="694" y="202" font-size="11" fill="#475569">放宽检索召回 → 双助手更保守</text>
    <text x="694" y="220" font-size="11" fill="#475569">合议阈值 0.65（更易转人工）</text>

    <line x1="600" y1="118" x2="170" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="650" y1="118" x2="500" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
    <line x1="700" y1="118" x2="830" y2="158" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#a)"/>
  </g>
  <text x="364" y="234" font-size="10" fill="#7c3aed">紫=双助手(LLM 只提议)　蓝=合议(确定性融合 + 硬阈值)</text>

  <!-- 共用尾链 tail -->
  <text x="20" y="270" font-size="12" font-weight="600" fill="#0f172a">三带共用尾链（确定性处置 + 各自幂等 + 补偿）</text>
  <g font-size="10.5" font-weight="600">
    <rect x="20" y="282" width="110" height="40" rx="6" fill="#dbeafe" stroke="#2563eb"/><text x="75" y="300" text-anchor="middle" fill="#1e3a8a">文案护栏</text><text x="75" y="314" text-anchor="middle" font-size="9" font-weight="400" fill="#1d4ed8">禁绝对化词</text>
    <rect x="138" y="282" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669"/><text x="193" y="300" text-anchor="middle" fill="#065f46">快速通道计数</text><text x="193" y="314" text-anchor="middle" font-size="9" font-weight="400" fill="#047857">原子 check-incr</text>
    <rect x="256" y="282" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669"/><text x="311" y="300" text-anchor="middle" fill="#065f46">支付幂等</text><text x="311" y="314" text-anchor="middle" font-size="9" font-weight="400" fill="#047857">claim_id 键 · paid</text>
    <rect x="374" y="282" width="110" height="40" rx="6" fill="#ffedd5" stroke="#ea580c"/><text x="429" y="300" text-anchor="middle" fill="#9a3412">settle 补偿判定</text><text x="429" y="314" text-anchor="middle" font-size="9" font-weight="400" fill="#c2410c">支付失败→failed</text>
    <rect x="492" y="282" width="110" height="40" rx="6" fill="#ffedd5" stroke="#ea580c"/><text x="547" y="300" text-anchor="middle" fill="#9a3412">release 释放名额</text><text x="547" y="314" text-anchor="middle" font-size="9" font-weight="400" fill="#c2410c">条件化补偿</text>
    <rect x="610" y="282" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669"/><text x="665" y="300" text-anchor="middle" fill="#065f46">状态机 CAS</text><text x="665" y="314" text-anchor="middle" font-size="9" font-weight="400" fill="#047857">→completed/failed</text>
    <rect x="728" y="282" width="110" height="40" rx="6" fill="#d1fae5" stroke="#059669"/><text x="783" y="300" text-anchor="middle" fill="#065f46">决策日志</text><text x="783" y="314" text-anchor="middle" font-size="9" font-weight="400" fill="#047857">挖掘闭环基质</text>
    <rect x="846" y="282" width="108" height="40" rx="6" fill="#f1f5f9" stroke="#94a3b8"/><text x="900" y="300" text-anchor="middle" fill="#334155">完成 / 转人工</text><text x="900" y="314" text-anchor="middle" font-size="9" font-weight="400" fill="#64748b">影子模式</text>
    <line x1="130" y1="302" x2="137" y2="302" stroke="#94a3b8" marker-end="url(#a)"/>
    <line x1="248" y1="302" x2="255" y2="302" stroke="#94a3b8" marker-end="url(#a)"/>
    <line x1="366" y1="302" x2="373" y2="302" stroke="#94a3b8" marker-end="url(#a)"/>
    <line x1="484" y1="302" x2="491" y2="302" stroke="#94a3b8" marker-end="url(#a)"/>
    <line x1="602" y1="302" x2="609" y2="302" stroke="#94a3b8" marker-end="url(#a)"/>
    <line x1="720" y1="302" x2="727" y2="302" stroke="#94a3b8" marker-end="url(#a)"/>
    <line x1="838" y1="302" x2="845" y2="302" stroke="#94a3b8" marker-end="url(#a)"/>
  </g>
  <line x1="170" y1="238" x2="76" y2="280" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="500" y1="238" x2="120" y2="280" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="830" y1="238" x2="160" y2="280" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- 不变量 callouts -->
  <g font-size="11.5">
    <rect x="20" y="350" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/>
    <text x="42" y="361" fill="#334155"><tspan font-weight="600" fill="#1e3a8a">确定性门单调收敛：</tspan>LLM 提议的决策只能被下游降级（approve→manual_review），永不升级（INV-1）</text>
    <rect x="20" y="376" width="14" height="14" rx="3" fill="#d1fae5" stroke="#059669"/>
    <text x="42" y="387" fill="#334155"><tspan font-weight="600" fill="#065f46">每个不可逆副作用各自幂等：</tspan>create-if-absent（入口）· CAS（出口）· 支付 paid 标志（钱）（INV-3）</text>
    <rect x="20" y="402" width="14" height="14" rx="3" fill="#ffedd5" stroke="#ea580c"/>
    <text x="42" y="413" fill="#334155"><tspan font-weight="600" fill="#9a3412">跨服务补偿：</tspan>支付失败 → settle 置 failed + 转人工 + release 释放快速通道名额，避免“钱没扣却显示完成”（INV-15）</text>
  </g>

  <!-- 图例 legend -->
  <g font-size="11" transform="translate(20,448)">
    <text x="0" y="11" font-weight="600" fill="#0f172a">图例</text>
    <rect x="44" y="0" width="14" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/><text x="64" y="11" fill="#475569">确定性 code（拥有否决权）</text>
    <rect x="230" y="0" width="14" height="14" rx="3" fill="#ede9fe" stroke="#7c3aed"/><text x="250" y="11" fill="#475569">LLM（只提议）</text>
    <rect x="360" y="0" width="14" height="14" rx="3" fill="#d1fae5" stroke="#059669"/><text x="380" y="11" fill="#475569">外部确定性服务（事务/幂等/支付/日志）</text>
    <rect x="640" y="0" width="14" height="14" rx="3" fill="#ffedd5" stroke="#ea580c"/><text x="660" y="11" fill="#475569">INV-3 跨服务补偿</text>
  </g>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
</svg>
